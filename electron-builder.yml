appId: com.phplay.app
productName: Phplay
copyright: Copyright © 2025 rhaymisonbetini

directories:
  buildResources: resources
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!documento-tecnico-produto-phplay.md'
  - '!**/__tests__/**'

asar: true

linux:
  executableName: phplay
  desktop:
    Name: Phplay
    Comment: Desktop PHP REPL — execute PHP in the context of your real projects
    Categories: Development;IDE;
    Keywords: PHP;REPL;Laravel;Developer;
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

deb:
  packageCategory: devel
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
    - target: zip

win:
  target:
    - target: nsis

npmRebuild: false
